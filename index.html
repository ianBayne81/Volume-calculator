<!DOCTYPE html>

<html>

<head>

    <title> Volume calculator App</title>
    <link href="https://fonts.googleapis.com/css?family=Black+Ops+One" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lobster" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Rock+Salt" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Anton" rel="stylesheet">
    <link href="styles/styles.css" rel="stylesheet">
   
</head>

<body>
    <div class="canvas">
        <div class="app">

            <div class="header">
                <h2>Flintstones</h2>
                <h2>Landscape</h2>
                <h2>Land</h2>   
            </div>

            <div class="sub-section">
                <h3>Volume Calculator</h3> 
            </div>

            <div class="selector">
               <label>Select</label><select id="drop-down" class="dropdown">
                    <option value="garden-shape">Garden shape</option>
                    <option value="rectangle">Rectangle / square</option>
                    <option value="triangle">Triangle</option>
                    <option value="circle">Circle</option>
                </select>
            </div>

            <div id="inputs">
                <!-- JS inserts inputs here -->
            </div>

            <div class="footer">
                <p class="sentence">flintstoneslandscapes.com.au</p>
            </div>

        </div>

    </div>

    <script src="/src/doms.js"></script>
    <script src="/src/index.js"></script>

</body>

</html>
